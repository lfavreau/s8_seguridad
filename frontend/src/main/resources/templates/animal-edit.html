<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar animal</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar">
    <h1 th:text="${accion + ' animal'}">Editar animal</h1>
    <a class="button secondary" th:href="@{/animales}">Volver</a>
</header>
<main class="container">
    <section class="panel">
        <form th:action="@{/animales/actualizar/{id}(id=${animal.id})}" th:object="${animal}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div th:replace="~{fragments/animal-fields :: fields}"></div>
            <button type="submit">Actualizar</button>
        </form>
    </section>
</main>
</body>
</html>
